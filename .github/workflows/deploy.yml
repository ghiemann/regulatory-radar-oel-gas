name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DIP_API_KEY: ${{ secrets.DIP_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch DIP data
        if: ${{ env.DIP_API_KEY != '' }}
        run: npm run fetch:dip
        env:
          DIP_LEGACY_MODE: true
          DIP_WAHLPERIODE: 21
          DIP_LEGACY_START_DATE: "2025-03-25"
          DIP_SCAN_LIMIT: 1200
          DIP_MAX_DOCUMENTS: 80

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
